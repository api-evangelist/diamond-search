apis:
- aid: diamond-search:idex-onsite-full-feed-api
  name: IDEX Onsite Full Feed API
  humanURL: https://api.idexonline.com/Onsite/FullFeed
  baseURL: https://api.idexonline.com/onsite/api
  tags:
  - Diamonds
  - Feed
  properties:
  - type: Documentation
    url: https://api.idexonline.com/Onsite/FullFeed
  - type: OpenAPI
    url: openapi/idex-onsite-full-feed-api-openapi.yml
  - type: NaftikoCapability
    url: capabilities/idex-onsite-full-feed-fullfeed.yaml
  description: In this natural diamond feed API you will send an HTTP request with the requested identifiers in JSON, and
    you will get the full details of matching pre-filtered diamonds back in the requested format. This service is available
    as an add-on to all subscribers of the IDEX trading platform, however, results may vary based on your subscription type
    and permissions. Filters and markups can be set on IDEX.
  contact:
  - FN: IDEX Online Support
    email: support@idexonline.com
- aid: diamond-search:idex-lab-grown-file-api
  name: IDEX Lab Grown File API
  humanURL: https://api.idexonline.com/Onsite/LabGrownFullFile
  baseURL: https://api.idexonline.com/Onsite
  tags:
  - Diamonds
  - Lab Grown
  properties:
  - type: Documentation
    url: https://api.idexonline.com/Onsite/LabGrownFullFile
  - type: OpenAPI
    url: openapi/idex-lab-grown-file-api-openapi.yml
  - type: NaftikoCapability
    url: capabilities/idex-lab-grown-file-labgrownfullfile.yaml
  description: In this lab grown diamond feed API you will send an HTTP request with the requested identifiers in JSON, and
    you will get the full details of all filtered available diamonds back in a zipped CSV file. This service is available
    as an add-on to all subscribers of the IDEX trading platform, however, results may vary based on your subscription type
    and permissions. This feed will return all lab grown diamond listings available for onsite feeds from IDEX.
  contact:
  - FN: IDEX Online Support
    email: support@idexonline.com
