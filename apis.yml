aid: diamond-search
url: https://raw.githubusercontent.com/api-evangelist/diamond-search/refs/heads/main/apis.yml
name: Diamond Search
description: IDEX Online is the leading polished diamonds trading platform for professionals, providing unbiased, market-driven
  diamond pricing tools, news and research. The IDEX Onsite and Data Report APIs deliver natural diamond, lab grown diamond,
  and market data feeds to subscribers of the IDEX trading platform.
