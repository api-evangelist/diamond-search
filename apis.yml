  - type: NaftikoCapability
    url: capabilities/idex-data-report-getreport3.yaml
  description: In this API you will send an HTTP request with a date for which you want the report. You will get back a zipped
    CSV file. The file creation process may take a few minutes.
  contact:
  - FN: IDEX Online Support
    email: support@idexonline.com
