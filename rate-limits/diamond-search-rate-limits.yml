specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Diamond Search
providerId: diamond-search
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Diamonds
  - Lab Grown
  - Pricing
  - Trading
  - Rate Limiting
description: IDEX Online does not publish per-second/per-minute rate limits for its Onsite Full Feed,
  Lab Grown File, or Data Report APIs. The feeds are designed for periodic (typically daily) bulk consumption
  rather than high-frequency real-time access. Effective limits are governed by subscription type, fair-use
  policy, and the practical update cadence of the underlying inventory data.
sources:
  - https://api.idexonline.com/Onsite/FullFeed
  - https://api.idexonline.com/DiamondPrices
  - https://www.idexonline.com/OurServices-Price_Data
notes: No published rate-limit numbers; reconciled=false. The values below are descriptive placeholders
  pointing to subscription-bound usage rather than per-second throttles.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Subscription-bound feed access
    scope: subscription
    metric: varies
    limit: see IDEX Subscriber Agreement / contact support
    notes: Access is gated by subscription tier; feed pull cadence is expected to align with daily/periodic
      updates rather than high-frequency polling.
policies:
  - name: Fair Use
    description: Subscribers are expected to poll feeds on a periodic basis aligned with the publication
      cadence of the underlying inventory data; sustained high-frequency polling may be throttled.
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429/503 responses.
  - name: Subscription Permissions
    description: Endpoint availability and feed scope vary with subscription tier (Direct / Premium / Pro
      / Onsite).
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
