specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Diamond Search
providerId: diamond-search
publisherName: IDEX Online Ltd.
serviceCategory: Market Data / Diamond Trading
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Diamonds
  - Lab Grown
  - Pricing
  - Trading
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for IDEX Online Diamond Search. Billing is annual subscription
  per IDEX tier (Direct / Premium / Pro / Onsite); API access is bundled with the subscription rather
  than metered per request.
sources:
  - https://www.idexonline.com/Subscribe
  - https://www.idexonline.com/OurServices
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Refund
focusColumns:
  ServiceName: IDEX Diamond Search
  ServiceCategory: Market Data / Diamond Trading
  ProviderName: IDEX Online
  PublisherName: IDEX Online Ltd.
  InvoiceIssuerName: IDEX Online Ltd.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: subscription_seats
    description: Active IDEX subscriptions by tier
    unit: seat
    aggregation: count
    dimensions:
      - tier
  - name: feed_pulls
    description: Feed pulls / API calls by subscriber (informational, not invoiced)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - subscription_tier
principles:
  - name: Visibility
    description: Reconcile annual IDEX invoices against the contracted tier and seat count; the API itself
      does not produce a usage invoice.
  - name: Allocation
    description: Allocate IDEX subscription cost to the trading desk or storefront product that consumes
      the Onsite/Data Report feeds.
  - name: Optimization
    description: Choose the lowest tier that includes required entitlements (Onsite vs. Pro vs. Premium);
      cache feed snapshots to reduce repeated pulls and shared infrastructure load.
  - name: Accountability
    description: Subscription owner is responsible for renewal terms and ensuring API integrations stay
      within fair-use polling cadence.
maintainers:
