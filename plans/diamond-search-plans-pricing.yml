specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Diamond Search
providerId: diamond-search
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Diamonds
  - Lab Grown
  - Pricing
  - Trading
description: IDEX Online sells the Diamond Search platform as annual subscriptions. The Onsite/Data Report
  APIs are bundled as add-ons available to subscribers; API access is gated by subscription tier rather
  than metered per request. Pricing is a flat annual fee per subscription level.
sources:
  - https://www.idexonline.com/Subscribe
  - https://www.idexonline.com/OurServices
  - https://api.idexonline.com/Onsite/FullFeed
  - https://api.idexonline.com/DiamondPrices
plans:
  - id: diamond-search-direct
    name: IDEX Direct
    type: freemium
    description: Free access to the IDEX Diamond Search front-end. No API entitlement.
    entries:
      - label: Annual subscription
        name: direct_annual
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Diamond Search front-end
      - name: Market data browsing
  - id: diamond-search-premium
    name: IDEX Premium
    type: subscription
    description: Annual subscription to the IDEX trading network — diamond search, bidding, and buying
      online directly from suppliers. API access available as an add-on.
    entries:
      - label: Annual subscription
        name: premium_annual
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '500.00'
        userMultiplied: false
    elements:
      - name: Trading network access
      - name: Diamond search, bidding, buying
      - name: API add-on availability (subject to permissions)
  - id: diamond-search-pro
    name: IDEX Pro
    type: subscription
    description: All Premium features plus inventory upload.
    entries:
      - label: Annual subscription
        name: pro_annual
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '840.00'
        userMultiplied: false
    elements:
      - name: All Premium features
      - name: Inventory upload
      - name: API add-on availability
  - id: diamond-search-onsite
    name: IDEX Onsite
    type: subscription
    description: Annual subscription that supports running an integrated diamond storefront — choose diamonds,
      define markups, and sell online. Includes the Onsite Full Feed and Lab Grown file APIs.
    entries:
      - label: Annual subscription
        name: onsite_annual
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: '1250.00'
        userMultiplied: false
    elements:
      - name: IDEX Onsite Full Feed API
      - name: IDEX Lab Grown File API
      - name: Markup configuration and storefront integration
      - name: CSV / XML / JSON feed formats
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
